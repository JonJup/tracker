<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Treasury — Points Tracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Treasury">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAF8F4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C2B2D; --paper:#FAF8F4; --surface:#FFFFFF;
    --brass:#9C7322; --brass-deep:#7E5C15; --brass-soft:#F0E6CC;
    --earn:#2F6E4F; --earn-soft:#E4EFE7;
    --spend:#A8503A; --spend-soft:#F6E6E0;
    --line:#E7E1D5; --muted:#71756D;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Inter",system-ui,sans-serif; font-size:15px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:980px;margin:0 auto;padding:18px 20px 80px;}

  /* ---------- Sync bar ---------- */
  .syncbar{
    display:flex;align-items:center;gap:9px;
    margin:0 2px 16px;font-size:12.5px;color:var(--muted);
  }
  .dot{width:8px;height:8px;border-radius:50%;background:#B9BBB4;flex:none;transition:.2s;}
  .dot.ok{background:var(--earn);}
  .dot.busy{background:var(--brass);}
  .dot.err{background:var(--spend);}
  #syncText{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .syncgear{
    font-family:"Inter";font-size:12.5px;font-weight:500;color:var(--ink);
    background:none;border:1px solid var(--line);border-radius:8px;padding:4px 11px;cursor:pointer;transition:.15s;
  }
  .syncgear:hover{border-color:var(--brass);color:var(--brass-deep);}

  .banner{
    background:var(--brass-soft);border:1px solid #E4D4A8;color:#5d4711;
    border-radius:11px;padding:11px 14px;font-size:13px;margin:0 2px 16px;line-height:1.5;
  }
  .banner b{color:#4a3a0d;}
  .banner code{font-family:"Space Mono",monospace;font-size:12px;background:#fff8e7;padding:1px 5px;border-radius:4px;}

  /* ---------- Treasury header ---------- */
  .vault{
    text-align:center; padding:34px 20px 30px;
    border:1px solid var(--line); border-radius:18px;
    background:radial-gradient(120% 90% at 50% -20%, #fff 0%, var(--surface) 60%);
    box-shadow:0 1px 0 rgba(0,0,0,.02), 0 18px 40px -32px rgba(28,43,45,.5);
    position:relative; overflow:hidden;
  }
  .seal{width:60px;height:60px;margin:0 auto 10px;display:block;color:var(--brass);}
  .vault__label{font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); margin-bottom:6px;}
  .vault__balance{
    font-family:"Fraunces",serif; font-weight:900; font-size:clamp(56px,13vw,104px);
    line-height:.95; letter-spacing:-.02em; font-variant-numeric:tabular-nums; color:var(--ink);
  }
  .vault__unit{font-family:"Inter";font-weight:500;font-size:14px;color:var(--muted);margin-top:4px;}
  .stats{display:flex;justify-content:center;gap:0;flex-wrap:wrap;margin-top:20px;border-top:1px solid var(--line);padding-top:16px;}
  .stat{padding:2px 22px;}
  .stat + .stat{border-left:1px solid var(--line);}
  .stat__n{font-family:"Space Mono",monospace;font-weight:700;font-size:17px;}
  .stat__n.pos{color:var(--earn);}
  .stat__n.neg{color:var(--spend);}
  .stat__l{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:2px;}

  /* ---------- Columns ---------- */
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:26px;}
  @media(max-width:720px){.cols{grid-template-columns:1fr;}}
  .col__head{display:flex;align-items:baseline;justify-content:space-between;margin:0 4px 12px;}
  .col__title{font-family:"Fraunces",serif;font-weight:600;font-size:21px;letter-spacing:-.01em;}
  .addbtn{font-family:"Inter";font-size:13px;font-weight:500;color:var(--ink);background:none;border:1px dashed var(--line);border-radius:8px;padding:5px 11px;cursor:pointer;transition:.15s;}
  .addbtn:hover{border-color:var(--brass);color:var(--brass-deep);background:#fff;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 14px 13px;margin-bottom:11px;transition:transform .12s,box-shadow .12s;position:relative;}
  .card:hover{box-shadow:0 10px 26px -22px rgba(28,43,45,.55);}
  .card__eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:inline-block;}
  .card__name{font-weight:600;font-size:15.5px;line-height:1.3;padding-right:8px;}
  .card__note{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .card__foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;gap:10px;}

  .token{display:inline-flex;align-items:center;gap:6px;font-family:"Space Mono",monospace;font-weight:700;font-size:14px;color:var(--brass-deep);background:var(--brass-soft);padding:4px 10px 4px 8px;border-radius:20px;}
  .token__coin{width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #E6C76A, var(--brass));box-shadow:inset 0 0 0 1.5px rgba(126,92,21,.35);}

  .act{font-family:"Inter";font-weight:600;font-size:13px;cursor:pointer;border-radius:9px;padding:7px 15px;border:1px solid transparent;transition:.15s;}
  .act--earn{background:var(--earn);color:#fff;}
  .act--earn:hover{background:#27583f;}
  .act--spend{background:#fff;color:var(--brass-deep);border-color:var(--brass);}
  .act--spend:hover{background:var(--brass-soft);}
  .act:disabled{opacity:.45;cursor:not-allowed;}

  .iconbtn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:3px 6px;border-radius:6px;line-height:1;}
  .iconbtn:hover{color:var(--ink);background:#f1ede4;}
  .card__tools{position:absolute;top:9px;right:9px;display:flex;gap:1px;opacity:0;transition:.15s;}
  .card:hover .card__tools{opacity:1;}

  .empty{border:1px dashed var(--line);border-radius:13px;padding:22px 16px;text-align:center;color:var(--muted);font-size:13.5px;}

  /* ---------- Ledger ---------- */
  .ledger{margin-top:34px;}
  .ledger__head{display:flex;align-items:baseline;justify-content:space-between;margin:0 4px 12px;}
  .ledger__list{background:var(--surface);border:1px solid var(--line);border-radius:13px;overflow:hidden;}
  .row{display:grid;grid-template-columns:74px 1fr auto 92px 28px;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid var(--line);font-size:14px;}
  .row:first-child{border-top:none;}
  .row__date{font-family:"Space Mono",monospace;font-size:12px;color:var(--muted);}
  .row__label{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row__amt{font-family:"Space Mono",monospace;font-weight:700;font-size:14px;text-align:right;}
  .row__amt.pos{color:var(--earn);}
  .row__amt.neg{color:var(--spend);}
  .row__bal{font-family:"Space Mono",monospace;font-size:12.5px;color:var(--muted);text-align:right;}
  .row .iconbtn{opacity:0;justify-self:end;}
  .row:hover .iconbtn{opacity:1;}
  @media(max-width:720px){.row{grid-template-columns:60px 1fr auto 24px;}.row__bal{display:none;}}
  .clearbtn{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;}
  .clearbtn:hover{color:var(--spend);}
  .ledger__tools{display:flex;gap:14px;align-items:center;}
  #backupBtn:hover,#restoreBtn:hover{color:var(--brass-deep);}

  /* ---------- Modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(28,43,45,.42);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .scrim.open{display:flex;}
  .modal{background:var(--surface);border-radius:16px;padding:22px;width:100%;max-width:400px;box-shadow:0 30px 70px -30px rgba(28,43,45,.6);max-height:90vh;overflow:auto;}
  .modal__title{font-family:"Fraunces",serif;font-weight:600;font-size:20px;margin:0 0 6px;}
  .modal__sub{font-size:13px;color:var(--muted);margin:0 0 16px;line-height:1.5;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;font-family:"Inter";font-size:15px;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:#fff;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--brass);outline-offset:0;border-color:var(--brass);}
  .field textarea{resize:vertical;min-height:46px;}
  .seg{display:flex;gap:6px;}
  .seg button{flex:1;font-family:"Inter";font-size:13px;font-weight:500;padding:8px;border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;color:var(--muted);}
  .seg button.on{border-color:var(--brass);background:var(--brass-soft);color:var(--brass-deep);}
  .modal__foot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:8px;}
  .ghost{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:8px;}
  .ghost:hover{color:var(--spend);}
  .primary{background:var(--ink);color:#fff;border:none;border-radius:10px;padding:9px 18px;font-weight:600;font-size:14px;cursor:pointer;}
  .primary:hover{background:#0f1c1e;}
  .coderow{display:flex;gap:8px;}
  .coderow input{font-family:"Space Mono",monospace;font-size:14px;letter-spacing:.02em;}
  .minibtn{font-family:"Inter";font-size:13px;font-weight:600;border:1px solid var(--brass);color:var(--brass-deep);background:#fff;border-radius:9px;padding:0 14px;cursor:pointer;white-space:nowrap;}
  .minibtn:hover{background:var(--brass-soft);}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:11px;font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;z-index:60;box-shadow:0 14px 30px -16px rgba(0,0,0,.5);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .pulse{animation:pulse .5s ease;}
  @keyframes pulse{0%{transform:scale(1);}40%{transform:scale(1.06);}100%{transform:scale(1);}}
  @media(prefers-reduced-motion:reduce){.pulse{animation:none;}*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">

  <div class="syncbar">
    <span class="dot" id="syncDot"></span>
    <span id="syncText">Starting…</span>
    <button class="syncgear" id="syncOpen">Sync setup</button>
  </div>

  <div class="banner" id="configBanner" style="display:none"></div>

  <header class="vault">
    <svg class="seal" id="seal" viewBox="0 0 100 100" fill="none" aria-hidden="true">
      <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="2"/>
      <circle cx="50" cy="50" r="37" stroke="currentColor" stroke-width="1" stroke-dasharray="2 4.2"/>
      <path d="M50 30 L54.5 44.5 L69 44.5 L57 53.5 L61.5 68 L50 59 L38.5 68 L43 53.5 L31 44.5 L45.5 44.5 Z" fill="currentColor" opacity="0.9"/>
    </svg>
    <div class="vault__label">Points in your treasury</div>
    <div class="vault__balance" id="balance">0</div>
    <div class="vault__unit">redeemable points</div>
    <div class="stats">
      <div class="stat"><div class="stat__n pos" id="stWeek">+0</div><div class="stat__l">earned this week</div></div>
      <div class="stat"><div class="stat__n" id="stEarned">0</div><div class="stat__l">earned all-time</div></div>
      <div class="stat"><div class="stat__n neg" id="stSpent">0</div><div class="stat__l">spent all-time</div></div>
    </div>
  </header>

  <div class="cols">
    <section>
      <div class="col__head"><h2 class="col__title">Earn</h2><button class="addbtn" id="addEarn">+ New goal</button></div>
      <div id="earnList"></div>
    </section>
    <section>
      <div class="col__head"><h2 class="col__title">Spend</h2><button class="addbtn" id="addReward">+ New reward</button></div>
      <div id="rewardList"></div>
    </section>
  </div>

  <section class="ledger">
    <div class="ledger__head">
      <h2 class="col__title">Ledger</h2>
      <div class="ledger__tools">
        <button class="clearbtn" id="backupBtn">Backup</button>
        <button class="clearbtn" id="restoreBtn">Restore</button>
        <button class="clearbtn" id="clearLedger">Clear history</button>
        <input type="file" id="restoreInput" accept="application/json,.json" style="display:none">
      </div>
    </div>
    <div class="ledger__list" id="ledger"></div>
  </section>
</div>

<!-- Item modal -->
<div class="scrim" id="scrim">
  <div class="modal" role="dialog" aria-modal="true">
    <h3 class="modal__title" id="mTitle">New goal</h3>
    <div class="field"><label id="mNameLabel">Name</label><input id="mName" type="text" placeholder="e.g. All weekly goals met" autocomplete="off"></div>
    <div class="field" id="mTypeWrap"><label>Kind</label>
      <div class="seg" id="mSeg"><button data-type="weekly" class="on">Weekly</button><button data-type="milestone">Milestone</button></div>
    </div>
    <div class="field"><label id="mPtsLabel">Points</label><input id="mPts" type="number" min="1" step="1" placeholder="50"></div>
    <div class="field"><label>Note (optional)</label><textarea id="mNote" placeholder="A reminder of what this is for"></textarea></div>
    <div class="modal__foot">
      <button class="ghost" id="mDelete" style="visibility:hidden">Delete</button>
      <div style="display:flex;gap:8px;align-items:center"><button class="ghost" id="mCancel">Cancel</button><button class="primary" id="mSave">Save</button></div>
    </div>
  </div>
</div>

<!-- Sync modal -->
<div class="scrim" id="syncScrim">
  <div class="modal" role="dialog" aria-modal="true">
    <h3 class="modal__title">Sync across devices</h3>
    <p class="modal__sub" id="syncIntro">Enter the same sync code on each device — phone, laptop, anywhere — and they all share one treasury.</p>
    <div id="syncConfigured">
      <div class="field"><label>This device's sync code</label>
        <div class="coderow"><input id="codeView" readonly><button class="minibtn" id="copyCode">Copy</button></div>
      </div>
      <div class="field"><label>Link to another code</label>
        <input id="codeEnter" placeholder="paste a code from your other device" autocomplete="off">
      </div>
      <div class="modal__foot">
        <button class="ghost" id="newCode">Generate new</button>
        <div style="display:flex;gap:8px;align-items:center"><button class="ghost" id="syncCancel">Close</button><button class="primary" id="syncConnect">Link</button></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG — paste your two Supabase values between the quotes.
   (Supabase dashboard → Project Settings → API)
   The anon key is meant to be public, so it is safe to host.
   Until you fill these in, the app runs locally on this device.
   ============================================================ */
const CONFIG = {
  url:    https://ngfdxboxmzgqqdjfvvdu.supabase.com,   // e.g. https://abcdxyz.supabase.co
  anonKey: sb_publishable_DVoV3NGGSEPl_qreeAwn3g_y-4q_EmY       // the long "anon public" key
};
/* ============================================================ */

const CACHE_KEY = "pt:cache:v1";
const CODE_KEY  = "pt:synccode:v1";
const $ = s => document.querySelector(s);

let state = null;
let code  = null;
const DEFAULT = {
  earn:[
    {id:id(),name:"All weekly goals met",type:"weekly",pts:50,note:"Award once a week when you hit everything."},
    {id:id(),name:"Completed long run",type:"milestone",pts:25,note:""},
    {id:id(),name:"Finnish study streak (7 days)",type:"weekly",pts:30,note:""},
    {id:id(),name:"Submitted a manuscript",type:"milestone",pts:200,note:"The big ones."},
  ],
  rewards:[
    {id:id(),name:"Guilt-free rest day",cost:40,note:""},
    {id:id(),name:"A new book",cost:120,note:""},
    {id:id(),name:"Dinner out",cost:250,note:""},
    {id:id(),name:"Big treat / new gear",cost:500,note:""},
  ],
  history:[]
};

function id(){ return Math.random().toString(36).slice(2,10); }
function fmt(n){ return n.toLocaleString("en-US"); }
function configured(){ return CONFIG.url.startsWith("http") && CONFIG.anonKey.length > 20; }
function syncReady(){ return configured() && !!code; }

function genCode(){
  const a = new Uint8Array(10); crypto.getRandomValues(a);
  const s = Array.from(a, b => b.toString(16).padStart(2,"0")).join("");
  return "trez-" + s.slice(0,4) + "-" + s.slice(4,8) + "-" + s.slice(8,12) + "-" + s.slice(12,16);
}

/* ---------- local cache (instant load + offline) ---------- */
function cacheLocal(){
  try{
    localStorage.setItem(CACHE_KEY, JSON.stringify(state));
    if(code) localStorage.setItem(CODE_KEY, code);
  }catch(e){}
}
function loadCache(){
  try{
    const raw = localStorage.getItem(CACHE_KEY);
    state = raw ? JSON.parse(raw) : structuredClone(DEFAULT);
    code = localStorage.getItem(CODE_KEY) || null;
  }catch(e){ state = structuredClone(DEFAULT); }
}

/* ---------- Supabase REST ---------- */
function api(path, opts){
  return fetch(CONFIG.url + "/rest/v1/" + path, Object.assign({}, opts, {
    headers: Object.assign({
      "apikey": CONFIG.anonKey,
      "Authorization": "Bearer " + CONFIG.anonKey,
      "Content-Type": "application/json"
    }, (opts && opts.headers) || {})
  }));
}
async function cloudPull(c){
  const r = await api("treasuries?id=eq." + encodeURIComponent(c) + "&select=data", {method:"GET"});
  if(!r.ok) throw new Error("pull " + r.status);
  const arr = await r.json();
  return arr.length ? arr[0].data : null;
}
async function cloudPush(c, data){
  const r = await api("treasuries", {
    method:"POST",
    headers:{ "Prefer":"resolution=merge-duplicates,return=minimal" },
    body: JSON.stringify({ id:c, data, updated_at:new Date().toISOString() })
  });
  if(!r.ok) throw new Error("push " + r.status);
}

/* ---------- status pill ---------- */
function setStatus(kind, text){
  const dot = $("#syncDot");
  dot.className = "dot" + (kind==="ok"?" ok":kind==="busy"?" busy":kind==="err"?" err":"");
  $("#syncText").textContent = text;
}

/* ---------- save = cache + debounced cloud push ---------- */
let pushT;
function save(){
  cacheLocal();
  if(!syncReady()) return;
  setStatus("busy","Saving…");
  clearTimeout(pushT);
  pushT = setTimeout(async ()=>{
    try{ await cloudPush(code, state); setStatus("ok","Synced"); }
    catch(e){ setStatus("err","Offline — saved on this device"); }
  }, 500);
}

/* ---------- pull latest from cloud ---------- */
let pulling = false;
async function pull(){
  if(!syncReady() || pulling) return;
  pulling = true; setStatus("busy","Syncing…");
  try{
    const data = await cloudPull(code);
    if(data){ state = data; cacheLocal(); render(); }
    else { await cloudPush(code, state); }   // first time with this code → create the row
    setStatus("ok","Synced");
  }catch(e){ setStatus("err","Offline — using local copy"); }
  pulling = false;
}

/* ---------- derived ---------- */
function balance(){ return state.history.reduce((s,h)=> s + (h.kind==="earn"? h.amount : -h.amount), 0); }
function totals(){
  const wk = Date.now() - 7*864e5; let earned=0, spent=0, week=0;
  for(const h of state.history){
    if(h.kind==="earn"){ earned+=h.amount; if(new Date(h.ts).getTime()>=wk) week+=h.amount; }
    else spent+=h.amount;
  }
  return {earned, spent, week};
}

/* ---------- actions ---------- */
function award(goal){
  state.history.push({id:id(),ts:new Date().toISOString(),kind:"earn",label:goal.name,amount:goal.pts});
  save(); render();
  const s=$("#seal"); s.classList.remove("pulse"); void s.offsetWidth; s.classList.add("pulse");
  toast(`+${goal.pts} — ${goal.name}`);
}
function redeem(reward){
  if(balance() < reward.cost){ toast("Not enough points yet"); return; }
  state.history.push({id:id(),ts:new Date().toISOString(),kind:"spend",label:reward.name,amount:reward.cost});
  save(); render(); toast(`Redeemed — ${reward.name}`);
}
function removeEntry(eid){ state.history = state.history.filter(h=>h.id!==eid); save(); render(); }

/* ---------- rendering ---------- */
let shownBalance = 0;
function animateBalance(to){
  const el = $("#balance"), from = shownBalance;
  if(window.matchMedia("(prefers-reduced-motion:reduce)").matches || from===to){ el.textContent=fmt(to); shownBalance=to; return; }
  const start=performance.now(), dur=420;
  function step(now){ const t=Math.min(1,(now-start)/dur), e=1-Math.pow(1-t,3);
    el.textContent=fmt(Math.round(from+(to-from)*e)); if(t<1) requestAnimationFrame(step); else shownBalance=to; }
  requestAnimationFrame(step);
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function render(){
  animateBalance(balance());
  const t = totals();
  $("#stWeek").textContent = "+"+fmt(t.week);
  $("#stEarned").textContent = fmt(t.earned);
  $("#stSpent").textContent = "−"+fmt(t.spent);

  const eL=$("#earnList"); eL.innerHTML="";
  if(!state.earn.length) eL.innerHTML=`<div class="empty">No goals yet. Add something you want to reward yourself for.</div>`;
  state.earn.forEach(g=>{
    const c=document.createElement("div"); c.className="card";
    c.innerHTML=`<div class="card__tools"><button class="iconbtn" data-edit="earn" data-id="${g.id}">Edit</button></div>
      <span class="card__eyebrow">${g.type==="weekly"?"Weekly":"Milestone"}</span>
      <div class="card__name">${esc(g.name)}</div>
      ${g.note?`<div class="card__note">${esc(g.note)}</div>`:""}
      <div class="card__foot"><span class="token"><span class="token__coin"></span>${fmt(g.pts)}</span>
      <button class="act act--earn" data-award="${g.id}">Award</button></div>`;
    eL.appendChild(c);
  });

  const rL=$("#rewardList"); rL.innerHTML="";
  if(!state.rewards.length) rL.innerHTML=`<div class="empty">No rewards yet. Add something worth saving up for.</div>`;
  const bal=balance();
  state.rewards.forEach(r=>{
    const can=bal>=r.cost; const c=document.createElement("div"); c.className="card";
    c.innerHTML=`<div class="card__tools"><button class="iconbtn" data-edit="reward" data-id="${r.id}">Edit</button></div>
      <div class="card__name">${esc(r.name)}</div>
      ${r.note?`<div class="card__note">${esc(r.note)}</div>`:""}
      <div class="card__foot"><span class="token"><span class="token__coin"></span>${fmt(r.cost)}</span>
      <button class="act act--spend" data-redeem="${r.id}" ${can?"":"disabled"}>Redeem</button></div>`;
    rL.appendChild(c);
  });

  const lL=$("#ledger"); lL.innerHTML="";
  if(!state.history.length){ lL.innerHTML=`<div class="empty" style="border:none">Nothing yet. Award yourself some points to get started.</div>`; }
  let run=0;
  const rows=state.history.map(h=>{ run += h.kind==="earn"? h.amount : -h.amount; return Object.assign({},h,{bal:run}); });
  rows.slice().reverse().forEach(h=>{
    const d=new Date(h.ts), date=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    const row=document.createElement("div"); row.className="row";
    const sign=h.kind==="earn"?"pos":"neg", amt=(h.kind==="earn"?"+":"−")+fmt(h.amount);
    row.innerHTML=`<span class="row__date">${date}</span><span class="row__label">${esc(h.label)}</span>
      <span class="row__amt ${sign}">${amt}</span><span class="row__bal">${fmt(h.bal)}</span>
      <button class="iconbtn" data-undo="${h.id}" title="Remove">✕</button>`;
    lL.appendChild(row);
  });
}

/* ---------- item modal ---------- */
let editing=null, segType="weekly";
function openModal(mode,item){
  editing={mode,id:item?item.id:null}; const isEarn=mode==="earn";
  $("#mTitle").textContent=item?(isEarn?"Edit goal":"Edit reward"):(isEarn?"New goal":"New reward");
  $("#mPtsLabel").textContent=isEarn?"Points":"Cost";
  $("#mName").value=item?item.name:""; $("#mPts").value=item?(isEarn?item.pts:item.cost):"";
  $("#mNote").value=item?(item.note||""):""; $("#mTypeWrap").style.display=isEarn?"block":"none";
  segType=isEarn?(item?item.type:"weekly"):"weekly";
  document.querySelectorAll("#mSeg button").forEach(b=>b.classList.toggle("on",b.dataset.type===segType));
  $("#mDelete").style.visibility=item?"visible":"hidden";
  $("#scrim").classList.add("open"); setTimeout(()=>$("#mName").focus(),30);
}
function closeModal(){ $("#scrim").classList.remove("open"); editing=null; }
function saveModal(){
  const name=$("#mName").value.trim(), num=parseInt($("#mPts").value,10), note=$("#mNote").value.trim();
  if(!name){ toast("Give it a name"); return; }
  if(!num||num<1){ toast("Enter a point value"); return; }
  const {mode,id:eid}=editing;
  if(mode==="earn"){
    if(eid){ const g=state.earn.find(x=>x.id===eid); Object.assign(g,{name,pts:num,note,type:segType}); }
    else state.earn.push({id:id(),name,type:segType,pts:num,note});
  }else{
    if(eid){ const r=state.rewards.find(x=>x.id===eid); Object.assign(r,{name,cost:num,note}); }
    else state.rewards.push({id:id(),name,cost:num,note});
  }
  save(); closeModal(); render();
}
function deleteItem(){
  const {mode,id:eid}=editing; if(!eid) return;
  if(mode==="earn") state.earn=state.earn.filter(x=>x.id!==eid);
  else state.rewards=state.rewards.filter(x=>x.id!==eid);
  save(); closeModal(); render();
}

/* ---------- sync modal ---------- */
function openSync(){
  if(!configured()){
    $("#syncIntro").textContent = "Cloud sync isn't set up yet. Open this file and paste your Supabase Project URL and anon key into the CONFIG block near the top of the script, then reload. Until then your points save on this device only.";
    $("#syncConfigured").style.display="none";
  }else{
    $("#syncIntro").textContent = "Enter the same sync code on each device — phone, laptop, anywhere — and they all share one treasury.";
    $("#syncConfigured").style.display="block";
    $("#codeView").value = code || "";
    $("#codeEnter").value = "";
  }
  $("#syncScrim").classList.add("open");
}
function closeSync(){ $("#syncScrim").classList.remove("open"); }

/* ---------- toast ---------- */
let toastT;
function toast(msg){ const el=$("#toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),1900); }

/* ---------- events ---------- */
document.addEventListener("click", e=>{
  const t=e.target;
  if(t.dataset.award){ award(state.earn.find(g=>g.id===t.dataset.award)); }
  else if(t.dataset.redeem){ redeem(state.rewards.find(r=>r.id===t.dataset.redeem)); }
  else if(t.dataset.undo){ removeEntry(t.dataset.undo); }
  else if(t.dataset.edit){
    const mode=t.dataset.edit, eid=t.dataset.id;
    openModal(mode, mode==="earn"? state.earn.find(x=>x.id===eid) : state.rewards.find(x=>x.id===eid));
  }
});
$("#addEarn").onclick=()=>openModal("earn",null);
$("#addReward").onclick=()=>openModal("reward",null);
$("#mCancel").onclick=closeModal; $("#mSave").onclick=saveModal; $("#mDelete").onclick=deleteItem;
$("#scrim").onclick=e=>{ if(e.target===$("#scrim")) closeModal(); };
$("#mSeg").onclick=e=>{ if(e.target.dataset.type){ segType=e.target.dataset.type; document.querySelectorAll("#mSeg button").forEach(b=>b.classList.toggle("on",b.dataset.type===segType)); } };
$("#mName").addEventListener("keydown",e=>{ if(e.key==="Enter") saveModal(); });

$("#clearLedger").onclick=()=>{ if(!state.history.length) return;
  if(confirm("Clear the entire ledger? Your goals and rewards stay; only the history is removed.")){ state.history=[]; save(); render(); } };

$("#backupBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob), a=document.createElement("a"), d=new Date().toISOString().slice(0,10);
  a.href=url; a.download=`treasury-backup-${d}.json`; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000); toast("Backup saved");
};
$("#restoreBtn").onclick=()=>$("#restoreInput").click();
$("#restoreInput").onchange=e=>{
  const file=e.target.files[0]; if(!file) return; const reader=new FileReader();
  reader.onload=()=>{ try{ const data=JSON.parse(reader.result);
      if(!data||!Array.isArray(data.earn)||!Array.isArray(data.rewards)||!Array.isArray(data.history)) throw new Error("bad");
      if(confirm("Replace your current treasury with this backup? This overwrites what's here now (and syncs the result).")){ state=data; save(); render(); toast("Backup restored"); }
    }catch(err){ toast("That file isn't a valid backup"); } $("#restoreInput").value=""; };
  reader.readAsText(file);
};

/* sync modal events */
$("#syncOpen").onclick=openSync;
$("#syncCancel").onclick=closeSync;
$("#syncScrim").onclick=e=>{ if(e.target===$("#syncScrim")) closeSync(); };
$("#copyCode").onclick=async ()=>{ try{ await navigator.clipboard.writeText(code||""); toast("Code copied"); }catch(e){ $("#codeView").select(); document.execCommand&&document.execCommand("copy"); toast("Code copied"); } };
$("#newCode").onclick=async ()=>{
  if(!confirm("Generate a new code? This device will start a fresh treasury under the new code. Your current data is copied to it.")) return;
  code=genCode(); $("#codeView").value=code; cacheLocal();
  try{ await cloudPush(code, state); setStatus("ok","Synced"); toast("New code ready — copy it to your other device"); }catch(e){ setStatus("err","Offline"); }
};
$("#syncConnect").onclick=async ()=>{
  const v=$("#codeEnter").value.trim(); if(!v){ toast("Paste a code first"); return; }
  if(!confirm("Link this device to that code? It will load that treasury and replace what's shown here.")) return;
  code=v; cacheLocal(); closeSync(); await pull(); toast("Linked");
};

/* refresh when returning to the app */
window.addEventListener("focus", pull);
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) pull(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ closeModal(); closeSync(); } });

/* ---------- boot ---------- */
(function boot(){
  loadCache(); render();
  if(!configured()){
    setStatus("","Local only — cloud not set up");
    $("#configBanner").style.display="block";
    $("#configBanner").innerHTML = "<b>Cloud sync isn't switched on yet.</b> This is working locally on this device. To sync across PC and mobile, paste your Supabase <code>url</code> and <code>anonKey</code> into the CONFIG block near the top of this file, then reload. Tap <b>Sync setup</b> for details.";
    return;
  }
  if(!code){ code = genCode(); cacheLocal(); }
  pull();
})();
</script>
</body>
